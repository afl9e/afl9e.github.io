<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <noscript><meta http-equiv="refresh" content="4; url=http://84.51.52.126:2026"></noscript>
    <title>AFL 9/E | Sistem Yönlendiricisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #030305;
            --surface: rgba(15, 15, 20, 0.55);
            --border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
            --blue: #3b82f6;
            --purple: #c084fc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        .aurora { position: fixed; inset: 0; z-index: -1; background: #020203; overflow: hidden; }
        .blob { position: absolute; filter: blur(90px); opacity: 0.35; border-radius: 50%; animation: float 15s infinite alternate ease-in-out; }
        .b1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, var(--blue), transparent 60%); }
        .b2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--purple), transparent 60%); animation-delay: -5s; }
        
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.1); } }
        
        .container { background: var(--surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255,255,255,0.02); width: 100%; max-width: 950px; }
        
        h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 700; background: linear-gradient(135deg, #fff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 1.05rem; letter-spacing: 0.5px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 30px; }
        
        .node { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 35px 20px; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 240px; }
        .node:hover { transform: translateY(-5px); background: rgba(255,255,255,0.02); }
        
        .node h3 { font-size: 1.5rem; margin-bottom: 12px; color: #fff; font-weight: 700; letter-spacing: 1px; }
        .specs { font-size: 0.85rem; color: #cbd5e1; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; border: 1px solid rgba(255,255,255,0.02); }
        .status { font-size: 0.85rem; font-weight: 600; margin-top: auto; }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; top: 20px; right: 20px; }
        
        .active { border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 0 30px rgba(16, 185, 129, 0.1), inset 0 0 15px rgba(16, 185, 129, 0.05); background: rgba(16, 185, 129, 0.03); transform: translateY(-3px); }
        .active .status { color: var(--green); margin-bottom: 20px; }
        .active h3 { text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .active .dot { background: var(--green); box-shadow: 0 0 12px var(--green); animation: pulse 1.5s infinite; }
        
        .btn { background: linear-gradient(135deg, #10b981, #059669); color: white; text-decoration: none; padding: 12px 24px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; transition: all 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4); border-color: rgba(255,255,255,0.3); }
        
        .node2 .status { color: var(--blue); }
        .node2 .dot { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        
        .node3 .status { color: var(--purple); }
        .node3 .dot { background: var(--purple); box-shadow: 0 0 10px var(--purple); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        .loading { font-size: 0.9rem; color: #64748b; font-family: 'JetBrains Mono', monospace; animation: blink 1.5s infinite; letter-spacing: 0.5px;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
            .node { min-height: auto; padding: 20px; flex-direction: row; flex-wrap: wrap; text-align: left; align-items: center; justify-content: flex-start; }
            .dot { position: static; margin-right: 15px; margin-bottom: 0; }
            .node h3 { margin-bottom: 0; margin-right: 15px; font-size: 1.3rem; }
            .specs { margin-bottom: 0; padding: 6px 10px; font-size: 0.8rem; }
            .status { width: 100%; margin-top: 15px; text-align: right; }
            .btn { margin-top: 15px; padding: 10px 20px; }
            .active .status { margin-bottom: 0; }
            .active { transform: translateY(0); }
            .container { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }
        }
    </style>
</head>
<body>

    <div class="aurora">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <div class="container">
        <h1>Ağ Yönlendiricisi</h1>
        <p class="subtitle">Aksu Fen Lisesi Merkezi Yönetim ve Ödev Sistemi</p>
        
        <div class="grid">
            <div class="node active">
                <div class="dot"></div>
                <h3>XSM-1</h3>
                <div class="specs">Ryzen 5 3600</div>
                <div class="status">Bağlantı Kuruluyor</div>
                <a href="http://84.51.52.126:2026" class="btn">Hemen Bağlan</a>
            </div>

            <div class="node node2">
                <div class="dot"></div>
                <h3>XSM-2</h3>
                <div class="specs">Intel Core i7 12700K</div>
                <div class="status">İkincil Düğüm Beklemede</div>
            </div>

            <div class="node node3">
                <div class="dot"></div>
                <h3>XSM-3 (XWM)</h3>
                <div class="specs">Ryzen 7 9700X-6GHz</div>
                <div class="status">XWM Hava Modeli Aktif</div>
            </div>
        </div>

        <div class="loading">2 saniye içerisinde XSM-1 Ana Düğümüne aktarılıyorsunuz...</div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "http://84.51.52.126:2026";
        }, 2000);
    </script>
</body>
</html>
